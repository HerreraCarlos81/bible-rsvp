<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bible RSVP — Rapid Serial Visual Presentation reading. KJV, WEB, ASV, Almeida and more.">
    <meta name="theme-color" content="#0f172a">
    <title>Bible RSVP • Focused Scripture Reading</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📖<span class="logo-speed">⚡</span></span>
                    <div>
                        <h1 data-i18n="appName">Bible RSVP</h1>
                        <p class="tagline" data-i18n="tagline">Speed Reading • Focus on the Word</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="header-actions">
                        <button id="install-btn" class="btn btn-secondary hidden" data-i18n="installApp">Install App</button>
                    </div>
                    <div class="lang-switcher" role="group" aria-label="Interface language">
                        <button type="button" class="lang-btn active" data-lang="en" title="English" aria-label="English">
                            <span class="lang-flag" aria-hidden="true">🇺🇸</span>
                        </button>
                        <button type="button" class="lang-btn" data-lang="pt" title="Português" aria-label="Português">
                            <span class="lang-flag" aria-hidden="true">🇧🇷</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="card selector-card">
                <h2 data-i18n="selectChapter">Select Chapter</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="version" data-i18n="bibleVersion">Bible Version</label>
                        <select id="version" class="form-control"></select>
                    </div>

                    <div class="form-group">
                        <label for="book" data-i18n="book">Book</label>
                        <select id="book" class="form-control"></select>
                    </div>

                    <div class="form-group">
                        <label for="chapter" data-i18n="chapter">Chapter</label>
                        <select id="chapter" class="form-control"></select>
                    </div>
                </div>

                <button id="load-btn" class="btn btn-primary btn-large" data-i18n="loadChapter">Load Chapter</button>
            </div>

            <div id="preview-card" class="card preview-card hidden">
                <div class="preview-header">
                    <h3 id="preview-reference"></h3>
                    <div class="preview-stats">
                        <span id="preview-stats"></span>
                    </div>
                </div>
                <div id="preview-text" class="preview-text"></div>
                <button id="start-btn" class="btn btn-primary btn-large btn-start preview-start-btn" data-i18n="startReading">▶ Start Speed Reading</button>
            </div>

            <div id="settings-card" class="card settings-card hidden">
                <h3 data-i18n="rsvpSettings">Speed Reading (RSVP) Settings</h3>
                
                <div class="settings-grid">
                    <div class="setting">
                        <div class="setting-header">
                            <label data-i18n="speedWpm">Speed (WPM)</label>
                            <span id="wpm-value" class="setting-value">300</span>
                        </div>
                        <input type="range" id="wpm-slider" min="100" max="1200" step="10" value="300">
                        <div class="setting-hint" data-i18n="wordsPerMinute">Words per minute</div>
                    </div>

                    <div class="setting">
                        <label data-i18n="chunkSize">Chunk Size</label>
                        <div class="chunk-buttons">
                            <button class="chunk-btn active" data-chunk="1" data-i18n="chunk1">1 word</button>
                            <button class="chunk-btn" data-chunk="2" data-i18n="chunk2">2 words</button>
                            <button class="chunk-btn" data-chunk="3" data-i18n="chunk3">3 words</button>
                        </div>
                    </div>

                    <div class="setting">
                        <div class="setting-header">
                            <label data-i18n="fontSize">Font Size</label>
                            <span id="font-value" class="setting-value">3.5rem</span>
                        </div>
                        <input type="range" id="font-slider" min="2" max="6" step="0.2" value="3.5">
                    </div>
                </div>

                <div class="setting advanced">
                    <label>
                        <input type="checkbox" id="punctuation-pause" checked>
                        <span data-i18n="punctuationPause">Pause longer at punctuation (. , ; ! ?)</span>
                    </label>
                </div>
            </div>

            <div id="history-card" class="card history-card">
                <h3 data-i18n="historyTitle">📖 Reading History & Streak</h3>
                <div id="streak-display" class="streak-display">
                    <span id="streak-count">0</span> <span data-i18n="streakDays">consecutive days 🔥</span>
                </div>
                <div id="history-list" class="history-list"></div>
                <button id="clear-history-btn" class="btn btn-secondary btn-small" data-i18n="clearHistory">Clear History</button>
            </div>
        </main>

        <div id="ad-container" class="ad-container">
            <div class="ad-placeholder">
                <p><strong data-i18n="advertising">Advertising</strong></p>
                <p style="font-size: 0.75rem; opacity: 0.7;" data-i18n="adSupport">Support the project • Google Ads</p>
                <div class="ad-slot-inner" data-i18n="adPlaceholder">
                    Space for Google AdSense (Auto Ads or Display)
                </div>
            </div>
        </div>
    </div>

    <div id="rsvp-modal" class="rsvp-modal hidden">
        <div class="rsvp-content">
            <div class="rsvp-topbar">
                <div class="rsvp-reference">
                    <span id="rsvp-book-chapter"></span>
                    <span id="rsvp-verse" class="current-verse"></span>
                </div>
                <div class="rsvp-stats">
                    <span id="rsvp-progress"></span>
                    <span id="rsvp-wpm"></span>
                </div>
                <button id="close-rsvp" class="btn btn-close" data-i18n="exit">✕ Exit</button>
            </div>

            <div class="rsvp-display">
                <div id="rsvp-word" class="rsvp-word"></div>
            </div>

            <div class="rsvp-controls">
                <button id="pause-btn" class="btn btn-control" data-i18n="pause">⏸ Pause</button>
                
                <div class="control-group">
                    <button id="prev-verse-btn" class="btn btn-small" data-i18n="prevVerse">← Previous Verse</button>
                    <button id="next-verse-btn" class="btn btn-small" data-i18n="nextVerse">Next Verse →</button>
                </div>

                <div class="control-group chapter-nav">
                    <button id="prev-chapter-btn" class="btn btn-small" data-i18n="prevChapter">← Prev. Chapter</button>
                    <button id="next-chapter-btn" class="btn btn-small" data-i18n="nextChapter">Next Chapter →</button>
                </div>

                <div class="control-group">
                    <button id="speed-down" class="btn btn-small">− WPM</button>
                    <span id="current-wpm" class="control-value"></span>
                    <button id="speed-up" class="btn btn-small">+ WPM</button>
                </div>

                <div class="control-group">
                    <button id="chunk-down" class="btn btn-small">− Chunk</button>
                    <span id="current-chunk" class="control-value"></span>
                    <button id="chunk-up" class="btn btn-small">+ Chunk</button>
                </div>

                <button id="restart-btn" class="btn btn-control" data-i18n="restart">↻ Restart</button>
            </div>
        </div>
    </div>

    <!-- Next chapter toast (bottom right, 5s timer) -->
    <div id="next-chapter-toast" class="toast hidden">
      <div class="toast-body">
        <div class="toast-message" id="toast-message"></div>
        <div class="toast-progress">
          <div class="toast-bar" id="toast-bar"></div>
        </div>
        <div class="toast-actions">
          <button id="toast-yes-btn" class="btn btn-primary btn-small"></button>
          <button id="toast-no-btn" class="btn btn-secondary btn-small"></button>
        </div>
      </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
